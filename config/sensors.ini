# RK3568 双路视频异构三模型边缘推理配置
# 两路视频源：RTSP 外接摄像头(A路) + IMX415 V4L2 摄像头(B路)
# 三模型架构：COCO(人员/猫狗检测) + Fire(火焰/烟雾检测) + PPE(安全装备检测)

[watchdog]
# 故障定位阶段必须关闭：应用异常退出时保留系统与日志，不让硬件看门狗重启整机。
# 稳定性验证完成后，量产部署可改为 true。
enable = false
device = /dev/watchdog
timeout_sec = 30

[visible_inference]
enable = true               # 可见光推理总开关
# --- 三模型: COCO(人员/猫狗) + Fire(火焰/烟雾) + PPE(安全装备) ---
model_coco = ../model/yolov8n_coco_int8.rknn          # COCO 模型（INT8 量化，80 类目标）
model_fire = ../model/yolov8n_fire_smoke_int8.rknn    # 火焰烟雾模型
model_ppe = ../model/yolov8n_sh17_ppe_int8.rknn       # PPE 安全装备模型
label_coco = ../model/labels/coco_trimmed.txt
label_fire = ../model/labels/fire_smoke_labels.txt
label_ppe = ../model/labels/sh17_ppe_trimmed.txt
# 两路模型分配策略：
#   A路(RTSP) — COCO+PPE，侧重人员检测与安全装备识别
#   B路(IMX415) — COCO+Fire，侧重猫狗检测与火焰烟雾识别
external_models = coco,ppe        # RTSP 管线使用的模型
imx415_models = coco,fire         # V4L2 管线使用的模型
# 单核 NPU 每帧只跑一个模型，COCO 与其他模型轮转执行，避免 NPU 过载和互相阻塞
external_models_per_frame = 1
imx415_models_per_frame = 1
# 置信度阈值：COCO 0.55 可抑制约 50% 误检；Fire 0.65 因火焰易受反光/手指干扰；PPE 0.50 平衡召回率
coco_confidence = 0.55
coco_nms_iou = 0.45           # NMS IoU 阈值，通用检测任务标准值
fire_confidence = 0.65
fire_nms_iou = 0.45
ppe_confidence = 0.50
ppe_nms_iou = 0.45
interval_ms = 0               # 推理间隔：0 表示每帧都推理，不跳帧

[video_source_external]
type = tcp_mpegts
enable = true
# FFmpeg以TCP/MPEG-TS单点直连板端；MediaMTX只承接板端最终/result流。
url = tcp://0.0.0.0:5000?listen=1&tcp_nodelay=1
loader_rtsp_transport = tcp           # 非RTSP输入时该项被FFmpeg安全忽略
pull_interval_ms = 10                 # 拉流间隔 10ms，约 100fps 理论上限
inference_interval_ms = 150           # 每路约6-7fps，利用当前NPU/RGA余量
loader_max_ready_depth = 8            # PTS定时发布时吸收硬解提前完成的未来帧，避免队列溢出
loader_rtbufsize_bytes = 1048576      # 1MB 接收缓冲区，应对网络突发
loader_stimeout_us = 2000000          # 2 秒超时，超时判定断流
loader_max_delay_us = 100000          # 100ms 延迟上限，超时帧丢弃

[video_source_imx415]
type = v4l2
enable = true
device = /dev/video0
width = 1920
height = 1080
fps = 25                             # ISP实测稳定输出25fps，统一时基避免重复帧和积压
processing_width = 1280              # 预处理先缩到 720p 再旋转，降低 RGA 负载
processing_height = 720
pixel_format = NV12                  # RK3568 MPP 硬件编解码器原生支持的 YUV 4:2:0 半平面格式
color_space = bt601_full             # BT.601 Full Range，消除灰蓝偏色
rotation = 270                       # 270° = 逆时针 90°，适配摄像头物理安装方向
inference_interval_ms = 150

[stream_output]
# 板端将编码后的 H.264 流推送到 WSL MediaMTX
url = rtsp://192.168.137.1:8554/result

[mosaic_stream]
# 双路视频拼接为马赛克画面（左右并排），用于统一预览
enable = true
enable_rtsp = true
input_mode = side_by_side            # 左右并排；可选 vertical 上下叠放
width = 1920                         # 整张拼接画布宽度；左右双路时每个固定槽位宽960
height = 1080                        # 整张拼接画布高度，不代表每路各自1920x1080
fps = 25                             # 发布、采集、同步、编码统一稳定25fps时基
bitrate = 12000000                   # 1080p双画面12Mbps，提高细节与检测框边缘质量
stream_queue_size = 1                # 仅保留最新帧，避免编码积压
stream_drop_oldest_when_full = true
stream_consume_latest_only = true    # 编码线程只取最新帧，降低延迟
stream_resize_on_mismatch = false
preserve_aspect_ratio = true         # 等比缩放，禁止非等比拉伸
aspect_mode = cover                  # 填满各自槽位；比例不同时居中裁切，避免大面积黑边
draw_overlay = true                  # 在最终画布上绘制检测框，避免二次缩放锯齿
rtsp_packet_queue_size = 6           # 缓冲约 240ms 网络抖动

[record]
# 事件预录制：检测到事件时自动保存触发前后若干秒的视频
enabled = true
pre_seconds = 3                      # 触发前预录 3 秒
post_seconds = 3                     # 事后续录 3 秒
cache_seconds = 5                    # 环形缓存 5 秒编码包（>= pre_seconds+2 保证预录充足）
packet_queue_size = 512              # 约容纳 17 秒视频 @30fps
confirm_window = 5                   # 防抖窗口 5 帧，避免单帧误检触发录像
confirm_min_positive = 3             # 窗口内至少 3 帧阳性才触发
output_dir = /userdata/rk3568_inspection_terminal/data/records
max_files = 200                      # 最多保留 200 个录像文件
max_storage_mb = 4096                # 4GB 上限保护 Flash 寿命
min_free_space_mb = 512              # 最小保留 512MB 空闲空间

[sync]
# 双路帧同步：按采集时间戳配对 A/B 路帧，保证推理时两路画面时间一致
enabled = true
threshold_ms = 45                    # PTS匀速发布后按一帧40ms+5ms抖动窗口严格同步
queue_depth = 4                      # 覆盖约160ms抖动且不挤爆DMA缓冲池
source_stale_ms = 500                # 断流0.5秒后清除冻结旧画面并显示离线占位

[storage]
enable = true
base_dir = /userdata/rk3568_inspection_terminal/data/sqlite
db_prefix = edge_data_               # 数据库文件名: edge_data_YYYYMMDD.db
retention_days = 30                  # 工业部署要求至少 30 天数据可追溯
max_batch = 200                      # MQTT 每次最多上传 200 条
wal = true                           # WAL 模式：写不阻塞读，提高并发
sync = NORMAL                        # 在关键检查点同步，平衡性能与安全
inference_sample_ms = 1000           # 推理结果 1s 采样一次，平衡实时性与写入压力
write_batch_size = 50                # 攒够 50 条执行一次事务写入
write_flush_ms = 500                 # 最长 500ms 强制 flush
flush_before_fetch = false           # 减少不必要的 fsync
flush_before_mark = false
mark_update_chunk_size = 64          # 每次更新 64 条记录的上传标记

[inference_dispatch]
queue_size = 1024                    # 异步分发队列深度，防止突发检测结果丢失
warn_on_drop = true
drop_warn_interval_ms = 1000         # 1s 内最多告警一次，避免日志风暴
dynamic_sample_enable = true         # 负载高时自动降低采样频率
dynamic_sample_step_ms = 1000
dynamic_sample_max_ms = 15000        # 极端负载下最大 15s 采样一次

[mqtt]
enable = true
host = 127.0.0.1                     # 板端本地 Mosquitto Broker
port = 1883                          # MQTT 标准端口
topic = rk3568/rk3568_node_001/data  # 主题按项目/节点ID/数据类型层级命名
qos = 1                              # 至少一次投递，确保数据不丢失
keepalive = 15                       # 15s 心跳，加速断线检测（适合边缘设备快速恢复）
publish_interval_sec = 30            # 30s 批量发布，提高数据时效性
client_id = rk3568_edge
stream_info_enable = true            # 启用流状态上报
stream_info_interval_sec = 60
stream_info_topic = rk3568/rk3568_node_001/video/status
# 健康心跳：定期上报存活状态，供平台监控设备在线情况
health_report_enable = true
health_report_interval_sec = 30
health_report_topic = rk3568/rk3568_node_001/status
max_retry = 10
retry_interval_sec = 15
reconnect_backoff_min_ms = 1000      # 重连退避 1s 起步
reconnect_backoff_max_ms = 15000     # 15s 封顶
reconnect_jitter_ms = 500            # 随机抖动 500ms，避免大量设备同时重连冲击 Broker
tls_enable = false                   # 本机 Broker 不启用 TLS
ca_file = /etc/ssl/certs/ca.crt
tls_insecure = false                 # 生产环境必须为 false

[device]
device_id = rk3568_node_001          # 设备唯一标识，用于平台管理和数据溯源
site_id = site_001                   # 部署站点标识
fw_version = 1.0.0                   # 固件版本，用于 OTA 判断

[thermal]
# 热监控与自适应降频：根据 SoC 温度自动降低推理帧率
enable = true
sysfs_path = /sys/class/thermal/thermal_zone1/temp
poll_interval_ms = 1000
threshold_light = 65                 # 轻度过热 65°C
threshold_medium = 75                # 中度过热 75°C
threshold_heavy = 85                 # 重度过热 85°C
hysteresis = 4                       # 回滞 4°C，避免温度在阈值附近反复切换
throttle_light = 0.70                # 保留 70% 推理帧率
throttle_medium = 0.40               # 保留 40%
throttle_heavy = 0.10                # 保留 10%
heavy_skip_inference = true          # 重度时完全跳过推理以最大限度降温
# 预测性温控：基于温度变化率提前降级
predictive_enable = true
predictive_preempt_temp = 55         # 55°C 开始评估温升速率
predictive_slope_warn = 2.0          # 温升 > 2°C/s 时提前降级

# --- 线程实时调度配置 ---
# RK3568 为 4 个同构 Cortex-A55 核心，CPU0 预留内核/中断，应用使用 CPU1-3。
# 视频关键路径（采集/推理/编码）使用 RR 实时调度；
# 非关键路径（录像/MQTT/日志）使用 OTHER 普通调度 + 较低 nice 值。

[thread_rt]
enable = true
require_preempt_rt = false           # 不强制 PREEMPT_RT 内核
mlockall = true                      # 锁定全部内存页，防止 swap 导致延迟抖动
bind_process_affinity = true
process_cpus = 1-3                   # 应用限定 CPU1-CPU3（预留 CPU0 给系统）
policy = other                       # 默认 OTHER 调度
priority = 0
nice = 0
cpus = 1-3

[thread_rt_rtsp_loader]              # RTSP 拉流（网络 I/O 密集，优先级中等偏下）
enable = true
policy = rr
priority = 48
cpus = 1

[thread_rt_rtsp_process]             # RTSP 解码预处理（延迟关键路径，优先级较高）
enable = true
policy = rr
priority = 58
cpus = 2-3

[thread_rt_rtsp_inference]           # A 路 NPU 推理（中等优先级，推理时长可控）
enable = true
policy = rr
priority = 52
cpus = 2

[thread_rt_mosaic]                   # 马赛克拼接（最终输出，需保证流畅，独占 CPU3）
policy = rr
priority = 56
cpus = 3

[thread_rt_media_encoder]            # H.264 硬编码（输出关键路径）
policy = rr
priority = 54
cpus = 1

[thread_rt_rtsp_output]              # RTSP 推流输出（网络 I/O 密集，优先级较低）
policy = rr
priority = 40
cpus = 1

[thread_rt_event_recorder]           # 事件录像（非实时，允许延迟）
policy = other
priority = 0
nice = 5
cpus = 1

[thread_rt_mqtt_upload]              # MQTT 上传（后台任务）
policy = other
priority = 0
nice = 5
cpus = 1

[thread_rt_inference_dispatch]       # 推理结果分发（与推理同核心，减少缓存失效）
policy = other
priority = 0
cpus = 2

[thread_rt_thermal_monitor]          # 温度监控（低优先级后台）
policy = other
priority = 0
nice = 5
cpus = 1

[thread_rt_imx415_capture]           # IMX415 采集（数据源头，最高优先级，独占 CPU2）
policy = rr
priority = 62
cpus = 2

[thread_rt_imx415_process]           # IMX415 预处理（RGA 缩放/旋转，独占 CPU3）
policy = rr
priority = 60
cpus = 3

[thread_rt_imx415_inference]         # B 路 NPU 推理（与 A 路推理同优先级）
policy = rr
priority = 52
cpus = 2
