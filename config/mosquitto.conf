# Mosquitto MQTT Broker 配置文件
# 安装到 /etc/mosquitto/conf.d/ 作为主配置的补充；
# 持久化与日志沿用主配置文件 /etc/mosquitto/mosquitto.conf 的设置。

# 监听 1883 端口（MQTT 协议标准端口），绑定所有网络接口
# 0.0.0.0 允许 WSL/工控机等外部客户端连接本 Broker
listener 1883 0.0.0.0

protocol mqtt

# 允许匿名连接：首次联调和开发阶段设为 true 简化部署；
# 生产环境应改为 false，并配置 password_file 启用用户名/密码认证
allow_anonymous true
